# separate terms of service, privacy policy, and support
# documentation.

name: Publish Python Package

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags, e.g., v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine

      - name: Build the package
        run: python setup.py sdist bdist_wheel

      - name: Publish package to PyPI
        env:
          TWINE_USERNAME: ${{ __token__ }}
          TWINE_PASSWORD: ${{ pypi-AgEIcHlwaS5vcmcCJGY4NTViMjg0LTBiYzUtNDQ3Ni05ZGZhLTA1N2ZlNWZkNDc1YwACKlszLCIxMDcxZWY2Zi0xNmU1LTRkN2YtODY3YS03YmIxZjQ2YTZiZmEiXQAABiDs-1jcASK2zTnswB_eQ74-NRHvIqnZWZilnHlzZODX7w }}
        run: twine upload dist/*
